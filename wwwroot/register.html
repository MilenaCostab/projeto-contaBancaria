<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuBanco - Abrir Conta</title>
    <link rel="stylesheet" href="css/transactions.css">
</head>
<body>
    <header>
        <h1>MEUBANCO</h1>
    </header>
    <main style="max-width: 500px; margin: 50px auto;">
        <section id="cadastro">
            <h2>Abrir Nova Conta</h2>
            <form id="formCadastro">
                <input type="text" id="titular" placeholder="Nome Completo" required>
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="text" id="cpf" placeholder="CPF" required>
                <label for="dataNascimento" style="display: block; margin-top: 10px; font-size: 0.9em; color: #666;">Data de Nascimento:</label>
                <input type="date" id="dataNascimento" required>
                <input type="password" id="senha" placeholder="Crie uma Senha" required>
                
                <button type="submit">Finalizar Cadastro</button>
                <button type="button" onclick="window.location.href='login.html'" style="background: #95a5a6; margin-top: 10px;">Voltar ao Login</button>
            </form>
        </section>
    </main>

    <div id="notificacao" class="hidden"></div>

    <script src="js/register.js"></script>
</body>
</html>
