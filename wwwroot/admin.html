<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MeuBanco - Administração</title>
    <link rel="stylesheet" href="css/transactions.css">
    <style>
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 400px; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <h1>PAINEL ADMINISTRATIVO</h1>
        <button onclick="window.location.href='login.html'" style="width: auto; background: #0066cc;">Sair</button>
    </header>
    <main>
        <section>
            <h2>Gerenciar Contas</h2>
            <table>
                <thead>
                    <tr>
                        <th>Titular</th>
                        <th>CPF</th>
                        <th>Número</th>
                        <th>Agência</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabelaContas"></tbody>
            </table>
        </section>
    </main>

    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <h3>Ativar/Editar Conta</h3>
            <p id="editTitular"></p>
            <input type="hidden" id="editCpf">
            
            <label for="editTipo">Tipo de Conta:</label>
            <select id="editTipo">
                <option value="corrente">Corrente</option>
                <option value="poupanca">Poupança</option>
                <option value="mista">Ambas (Mista)</option>
            </select>
            <label for="editNumero">Número da Conta:</label>
            <input type="number" id="editNumero" placeholder="Número da Conta" required>
            <label for="editAgencia">Agência:</label>
            <input type="number" id="editAgencia" placeholder="Agência" required>
            <label for="editLimite">Limite (se Corrente):</label>
            <input type="number" id="editLimite" placeholder="Limite (se Corrente)">
            <!-- <label for="editCaixinhaSaldo">Saldo Caixinha:</label> -->
            <input type="number" id="editCaixinhaSaldo" placeholder="Saldo Caixinha" step="0.01">
            <button onclick="salvarAlteracoes()">Salvar Alterações</button>
            <button onclick="document.getElementById('modalEditar').style.display='none'" style="background:#95a5a6">Cancelar</button>
        </div>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
